<script>
 //suppose we have to set a alert when we click on owl image..we can do this in html body part also but it is not a good practice
 //so we will do it in js part

//  document.getElementById('owl').onclick=function(){
//     alert('You clicked on owl image');
//  }

//This is a god practice but it offers less flexibility and features
//So we will use addEventListener method
//IN event listener method syntax is like this addeventlistener('eventname',function(){code to be executed}, false)....it contains a third parameter also but it is optional beacuse by default it is false, but in some places maybe they are important
//click contains several events like dblclick, mouseover, mouseout etc
//while writing notes in copy write details of events

// document.getElementById('owl').addEventListener('click',function(){
//     alert('You clicked on owl image');
// });

//Let us see by adding multiple events to same element

document.getElementById('owl').addEventListener('click',function(){
    alert('You clicked on owl image');
});

//4th method can be attachevent...it is similar to addEventListener but it can add only one event to one element...if we try to add more than one event only the last one will work

document.getElementById('owl').addEventListener('click',function(){
    alert('You clicked on owl image');
    alert('Hello world'); // it should give alert as ''Hello world'' also but it is not giving because both alerts are in same event listener...to make it work we have to create another event listener..kit gives only ''You clicked on owl image'' beacause second alert is overriding the first one
    //when multiple event listeners are added to same element for same event type, they are executed in the order they were added.
    //Hence here first alert is executed followed by second alert.
    //But in screen only one alert is visible at a time. So when first alert is closed by user, second alert is shown.
});


</script>
