<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice EventListener</title>
  <style>
    body{
      margin: 10px;
      padding: 10px;
      background-color: green;
      color: white;
    }

    h1
    {
      text-align: center;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    button
    {
      display: block;
      margin: 10px auto;
      padding: 10px;
      font-size: 20px;
      height: 100px;
      width: 200px;
      cursor: pointer;
      background-color: white;
      color: black;
    }
    .buttons
    {
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>

  <h1>Karlungi Yaar mai</h1>
  <div class="buttons">
  <button id="sucks">Life sucks</button>
  <button id="loves">Life loves</button>
  <button id="neither">Life is neutral</button>
  </div>
  
</body>

<script>
  let buttons=document.querySelectorAll("button");

  for(let i=0;i<buttons.length;i++)
  {
    buttons[i].addEventListener('dblclick',function(){
      document.body.innerText=buttons[i].innerText;
    })

  }
</script>
</html>
