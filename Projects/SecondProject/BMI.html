<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <style>
    body{
      background-color: grey;
      color: white;
      padding: 10px;
      margin: 10px;
    }
    h1
    {
      text-align: center;
    }
    form
    {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    input{
        border: 2px solid black;
    }
    button{
        background-color: black;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>BMI Calculator </h1>
  <form id="form">

  <p><label>Height in cm </label><input type="text" id="Height" placeholder="enter height"></p>

  <p><label>Weight in kg </label><input type="text" id="Weight" placeholder="enter weight"></p>

  <button id="button" type="submit">CALCULATE</button>
  <div id="result"></div>

  
  <div class="guide">
   <h3> Standard BMI Categories</h3>
     <ul>
        <li>Underweight: BMI less than 18.5</li>
        <li>Normal weight: BMI 18.5 to 24.9</li>
        <li>Overweight: BMI 25 to 29.9</li>
        <li>Obesity: BMI 30 or greater</li>
     </ul>
  </div>
  </form>
</body>

<script src="script.js"></script>
</html>
